name: Build and Push Docker Image

on:
  push:
    branches:
      - master

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Generate timestamp
      id: timestamp
      run: echo "TAG=$(date +%Y%m%d-%H%M%S)-${{ github.run_number }}" >> $GITHUB_OUTPUT

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Build Docker image
      run: |
        docker build -t nischal60/image-workflow:${{ steps.timestamp.outputs.TAG }} \
                     -t nischal60/image-workflow:latest \
                     -f docker/Dockerfile .

    - name: Push Docker images
      run: |
        docker push nischal60/image-workflow:${{ steps.timestamp.outputs.TAG }}
        docker push nischal60/image-workflow:latest
