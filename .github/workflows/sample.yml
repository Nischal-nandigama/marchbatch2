name: Multi-Stage Workflow with ACR Secrets

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  stage1-build:
    name: Stage 1 - Build with JSON
    runs-on: ubuntu-latest
    outputs:
      artifact: ${{ steps.build.outputs.artifact }}
      version: ${{ steps.build.outputs.version }}
      timestamp: ${{ steps.build.outputs.timestamp }}
      build: ${{ steps.build.outputs.build }}
      commit: ${{ steps.build.outputs.commit }}
      # Don't pass secrets through outputs - they get masked!
    
    steps:
      - name: Build application
        id: build
        env:
          MY_SECRET: ${{ secrets.MY_SECRET }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
        run: |
          # Create variables
          ARTIFACT_NAME="myapp.zip"
          VERSION="1.0.0"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BUILD_NUMBER="${{ github.run_number }}"
          COMMIT_SHA="${{ github.sha }}"
          
          # Pass non-secret values as separate outputs
          echo "artifact=$ARTIFACT_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "build=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "commit=${COMMIT_SHA:0:7}" >> $GITHUB_OUTPUT
          
          echo "Output created successfully"

  stage2-test:
    name: Stage 2 - Use ACR Credentials
    runs-on: ubuntu-latest
    needs: stage1-build
    
    steps:
      - name: Use values from Stage 1 and secrets
        env:
          # Pass secrets directly to this job
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
        run: |
          echo "=== Received from Stage 1 ==="
          echo "Artifact: ${{ needs.stage1-build.outputs.artifact }}"
          echo "Version: ${{ needs.stage1-build.outputs.version }}"
          echo "Timestamp: ${{ needs.stage1-build.outputs.timestamp }}"
          echo "Build: ${{ needs.stage1-build.outputs.build }}"
          echo "Commit: ${{ needs.stage1-build.outputs.commit }}"
          echo ""
          echo "=== Using ACR Credentials (passed directly via env) ==="
          echo "ACR Registry: $ACR_REGISTRY"
          echo "ACR Username: $ACR_USERNAME"
          echo "ACR Password length: ${#ACR_PASSWORD}"
          
          # Now construct JSON in this job if needed
          JSON_OUTPUT=$(cat <<EOF
          {
            "artifact": "${{ needs.stage1-build.outputs.artifact }}",
            "version": "${{ needs.stage1-build.outputs.version }}",
            "timestamp": "${{ needs.stage1-build.outputs.timestamp }}",
            "build": "${{ needs.stage1-build.outputs.build }}",
            "commit": "${{ needs.stage1-build.outputs.commit }}",
            "acr_username": "$ACR_USERNAME",
            "acr_password": "$ACR_PASSWORD",
            "acr_registry": "$ACR_REGISTRY"
          }
          EOF
          )
          
          echo "Complete JSON with secrets: $JSON_OUTPUT"